<style>
    #tetrap-client-area {
        font-family: sans-serif;
        z-index: 10000000;
        position: fixed;
        right: 0px;
        width: 650px;
        max-width: 60vw;
        max-height: 60vh;
        padding: 2px;
        margin: 2px;
        border: 1px solid black;
        background-color: white;
    }
    #tetrap-client-area.after-menu-load {
        top: 4.2em;
        z-index: 999999; /* below the fade-out but above everything else */
    }
    #ap-connect-form {
        margin: 0px;
    }
    #ap-connect-form.disabled {
        display: none;
    }

    #ap-chat-messages {
        border: 1px solid black;
        background-color: #eee;
        width: calc(100%-8px);
        height: 200px;
        overflow: auto;
        padding: 3px;
    }
    #ap-chat-area.disabled {
        display: none;
    }
    .ap-chat-message {
        padding: 2px;
        margin: 0px;
    }

    #ap-chat-input {
        width: calc(100% - 50px);
    }

    #ap-status {
        margin: 5px 0px;
    }

    header.tetrap {
        display: flex;
        background-color: #99f;
        padding: 2px;
        margin: 2px;
        align-items: center;
    }
    p.tetrap {
        margin: 0px 5px;
        font-weight: bold;
    }
    #ap-collapse {
        border: none;
        background-color: #77777733;
    }
    #ap-collapse:hover {
        background-color: #777777aa;
    }

    #tetrap-client-area.collapsed {
        width: auto;
        height: auto;
    }
    #tetrap-client-area.collapsed #ap-chat-area {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-connect-form {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-status {
        display: none;
    }
    #ap-shortstatus {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-shortstatus {
        display: block;
        margin: 2px;
    }
</style>

<header class="tetrap">
    <button id="ap-collapse">▶</button>
    <p class="tetrap">TETR.AP client</p>
</header>

<form id="ap-connect-form">
    <label for="server">Server:</label>
    <input id="ap-server" type="text" placeholder="archipelago.gg:12345" required>
    <br>
    <label for="slot">Slot Name:</label>
    <input id="ap-slot" type="text" required>
    <br>
    <label for="password">Password (opt):</label>
    <input id="ap-password" type="text">
    <br>
    <input type="submit" value="Connect">
</form>
<p id="ap-status"></p>
<p id="ap-shortstatus">Not connected</p>

<div id="ap-chat-area" class="disabled">
    <div id="ap-chat-messages"></div>
    <div id="ap-chat-controls">
        <form onsubmit="return false;">
            <input id="ap-chat-input" type="text" placeholder="type a message..."> 
            <input id="ap-chat-send" type="submit" value="Send">
        </form>
        <input id="ap-disconnect" type="button" value="Disconnect">
    </div>
</div>
