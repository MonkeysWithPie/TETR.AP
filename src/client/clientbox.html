<style>
    #tetrap-client-area {
        font-family: sans-serif;
        z-index: 10000000;
        position: fixed;
        right: 0px;
        width: 650px;
        max-width: 60vw;
        max-height: 60vh;
        padding: 2px;
        margin: 2px;
        border: 1px solid black;
        background-color: white;
        transition: opacity 0.3s ease-out;
    }
    #tetrap-client-area.after-menu-load {
        top: 4.2em;
        z-index: 999999; /* below the fade-out but above everything else */
    }
    #ap-connect-form {
        margin: 0px;
    }

    .ap-tab.disabled {
        display: none;
    }

    #ap-chat-messages {
        border: 1px solid black;
        background-color: #303030;
        color: white;
        width: calc(100%-8px);
        height: 200px;
        overflow: auto;
        padding: 3px;
    }
    .ap-message {
        padding: 2px;
        margin: 0px;
        white-space: pre-wrap;
    }
    .ap-item-message {
        font-weight: bold;
    }
    .ap-location-message {
        color: rgb(115, 192, 95);
    }
    .ap-player-message {
        color: rgb(73, 157, 253);
    }

    #ap-chat-input {
        width: 100%;
        box-sizing: border-box;
    }
    
    header.tetrap {
        display: flex;
        background-color: #99f;
        padding: 2px;
        align-items: center;
    }
    p.tetrap {
        margin: 0px 4px;
        font-weight: bold;
    }
    #ap-status {
        margin-left: auto;
        font-size: smaller;
        font-weight: normal;
    }
    #ap-username {
        font-size: smaller;
    }
    #ap-username:empty {
        display: none;
    }

    #ap-collapse {
        border: none;
        background-color: #77777733;
    }
    #ap-collapse:hover {
        background-color: #777777aa;
    }

    #tetrap-client-area.collapsed {
        width: auto;
        height: auto;
        opacity: 0.3;
    }
    #tetrap-client-area.collapsed:hover {
        opacity: 1;
    }
    #tetrap-client-area.collapsed .ap-tab {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-status {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-username {
        display: none;
    }

    #ap-shortstatus {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-shortstatus {
        display: block;
        margin: 2px;
    }
</style>

<header class="tetrap">
    <button id="ap-collapse">▶</button>
    <p class="tetrap">TETR.AP client</p>
    <p class="tetrap" id="ap-status"></p>
    <p class="tetrap" id="ap-username"></p>
</header>
<p id="ap-shortstatus">Not connected</p>

<form id="ap-connect-form" class="ap-tab">
    <label for="server">Server:</label>
    <input id="ap-server" type="text" placeholder="archipelago.gg:12345" required>
    <br>
    <label for="slot">Slot Name:</label>
    <input id="ap-slot" type="text" required>
    <br>
    <label for="password">Password (opt):</label>
    <input id="ap-password" type="text">
    <br>
    <input type="submit" value="Connect">
</form>

<div id="ap-chat-area" class="ap-tab disabled">
    <div id="ap-chat-messages"></div>
    <div id="ap-chat-controls">
        <input id="ap-chat-input" type="text" placeholder="type a message, press enter to send..." autocomplete="off">
        <input id="ap-disconnect" type="button" value="Disconnect">
    </div>
</div>
