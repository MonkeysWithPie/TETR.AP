<style>
    #tetrap-client-area {
        font-family: sans-serif;
        z-index: 10000000;
        position: fixed;
        right: 0px;
        width: 650px;
        max-width: 60vw;
        max-height: 60vh;
        margin: 2px;
        background-color: white;
        transition: opacity 0.3s ease-out;
    }
    #tetrap-client-area.after-menu-load {
        top: 4.2em;
        z-index: 999999; /* below the fade-out but above everything else */
    }

    .ap-tab {
        margin: 4px;
    }
    .ap-tab.disabled {
        display: none;
    }

    #ap-chat-messages {
        border: 1px solid black;
        background-color: #303030;
        color: white;
        width: calc(100%-8px);
        height: 200px;
        overflow: auto;
        padding: 3px;
    }
    .ap-message {
        padding: 2px;
        margin: 0px;
        white-space: pre-wrap;
    }
    .ap-item-message {
        font-weight: bold;
    }
    .ap-location-message {
        color: rgb(115, 192, 95);
    }
    .ap-player-message {
        color: rgb(73, 157, 253);
    }

    #ap-chat-input {
        width: 100%;
        box-sizing: border-box;
    }
    
    header.tetrap {
        display: flex;
        background-color: #99f;
        padding: 2px;
        align-items: center;
    }

    #ap-nav {
        display: flex;
        background-color: #bbf;
        margin-bottom: 2px;
        border-top: 1px solid black;
    }

    .ap-tab-button {
        padding: 0px 6px;
        border-right: 1px solid black;
        border-bottom: 1px solid black;
        background-color: #7773;
        transition: padding 0.2s, background 0.2s;

        user-select: none;
        -webkit-user-select: none; /* thank you safari */
        cursor: pointer;
    }
    .ap-tab-button.active {
        background-image: linear-gradient(#bbf, white);
        padding: 0px 16px;
        border-bottom: none;
    }

    .ap-tab-button:hover {
        background-color: #fff3;
    }

    #ap-nav.disabled .ap-tab-button:not(.active) {
        color: #777;
        background-color: #aaaa;
        cursor: not-allowed;
    }

    p.tetrap {
        margin: 0px 4px;
        font-weight: bold;
    }
    #ap-status {
        margin-left: auto;
        font-size: smaller;
        font-weight: normal;
    }
    #ap-username {
        font-size: smaller;
    }
    #ap-username:empty {
        display: none;
    }

    #ap-collapse {
        border: none;
        background-color: #77777733;
    }
    #ap-collapse:hover {
        background-color: #777777aa;
    }

    #tetrap-client-area.collapsed {
        width: auto;
        height: auto;
        opacity: 0.3;
    }
    #tetrap-client-area.collapsed:hover {
        opacity: 1;
    }
    #tetrap-client-area.collapsed .ap-tab {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-status {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-username {
        display: none;
    }
    #tetrap-client-area.collapsed nav {
        display: none;
    }

    #ap-shortstatus {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-shortstatus {
        display: block;
        margin: 2px;
    }
</style>

<header class="tetrap">
    <button id="ap-collapse">▶</button>
    <p class="tetrap">TETR.AP client</p>
    <p class="tetrap" id="ap-status"></p>
    <p class="tetrap" id="ap-username"></p>
</header>
<p id="ap-shortstatus">Not connected</p>

<nav id="ap-nav" class="tetrap disabled">
    <!-- auto-populated by script -->
</nav>

<div id="ap-connect-area" class="ap-tab" data-tab-name="connect">
    <form id="ap-connect-form">
        <label for="server">Server:</label>
        <input id="ap-server" type="text" placeholder="archipelago.gg:12345" required>
        <br>
        <label for="slot">Slot Name:</label>
        <input id="ap-slot" type="text" required>
        <br>
        <label for="password">Password (opt):</label>
        <input id="ap-password" type="text">
        <br>
    </form>
    <input id="ap-connect" type="button" value="Connect">
</div>

<div id="ap-chat-area" class="ap-tab disabled" data-tab-name="chat">
    <div id="ap-chat-messages"></div>
    <input id="ap-chat-input" type="text" placeholder="type a message, press enter to send..." autocomplete="off">
    </div>
</div>
