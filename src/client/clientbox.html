<style>
    #tetrap-client-area {
        font-family: sans-serif;
        z-index: 10000000;
        position: fixed;
        right: 0px;
        width: 650px;
        max-width: 60vw;
        max-height: 60vh;
        margin: 2px;
        background-color: var(--ap-bg);
        color: var(--ap-text);
        transition: opacity 0.3s ease-out;

        --ap-text: #000;
        --ap-bg: #fff;
        --ap-bg-darker: #ddd;
        --ap-header: #99f;
        --ap-nav: #bbf;

        --ap-disabled: #777;
        --ap-disabled-bg: #aaa;
    }

    #tetrap-client-area.dark {
        --ap-text: #eee;
        --ap-bg: #333;
        --ap-bg-darker: #111;
        --ap-header: #227;
        --ap-nav: #447;

        --ap-disabled: #aaa;
        --ap-disabled-bg: #555;
    }

    #tetrap-client-area input {
        border: 1px solid var(--ap-disabled);
        border-radius: 2px;
        padding: 2px;
        background-color: var(--ap-bg);
        color: var(--ap-text);
    }
    #tetrap-client-area input:disabled {
        background-color: var(--ap-disabled-bg);
        color: var(--ap-disabled);
    }
    
    #tetrap-client-area input[type="submit"] {
        padding: 2px 6px;
    }
    #tetrap-client-area input[type="submit"]:hover {
        background-color: rgb(from var(--ap-bg-darker) r g b / 0.7);
    }
    #tetrap-client-area input[type="submit"]:active {
        background-color: var(--ap-bg-darker);
    }
    #ap-connect-form br {
        margin: 4px 0px;
    }

    #tetrap-client-area.after-menu-load {
        top: 4.2em;
        z-index: 999999; /* below the fade-out but above everything else */
    }

    .ap-tab {
        margin: 4px;
    }
    .ap-tab.disabled {
        display: none;
    }

    #ap-chat-messages {
        border: 1px solid var(--ap-text);
        background-color: var(--ap-bg-darker);
        width: calc(100%-8px);
        height: 200px;
        overflow: auto;
        padding: 3px;
    }
    .ap-message {
        padding: 2px;
        margin: 0px;
        white-space: pre-wrap;
    }
    .ap-item-message {
        font-weight: bold;
    }
    .ap-location-message {
        color: rgb(115, 192, 95);
    }
    .ap-player-message {
        color: rgb(73, 157, 253);
    }

    #ap-chat-input {
        width: 100%;
        box-sizing: border-box;
    }
    
    header.tetrap {
        display: flex;
        background-color: var(--ap-header);
        padding: 2px;
        align-items: center;
    }

    #ap-nav {
        display: flex;
        background-color: var(--ap-nav);
        margin-bottom: 2px;
        border-top: 1px solid var(--ap-text);
    }

    .ap-tab-button {
        padding: 0px 6px;
        border-right: 1px solid var(--ap-text);
        border-bottom: 1px solid var(--ap-text);
        background-color: #7773;
        transition: padding 0.2s, background 0.2s;

        user-select: none;
        -webkit-user-select: none; /* thank you safari */
        cursor: pointer;
    }
    .ap-tab-button.active {
        background-image: linear-gradient(var(--ap-nav), var(--ap-bg));
        padding: 0px 16px;
        border-bottom: none;
    }

    .ap-tab-button:hover {
        background-color: rgb(from var(--ap-bg) r g b / 0.2);
    }

    #ap-nav.disabled .ap-tab-button:not(.active) {
        color: var(--ap-disabled);
        background-color: var(--ap-disabled-bg);
        cursor: not-allowed;
    }

    p.tetrap {
        margin: 0px 4px;
        font-weight: bold;
    }
    #ap-status {
        margin-left: auto;
        font-size: smaller;
        font-weight: normal;
    }
    #ap-username {
        font-size: smaller;
    }
    #ap-username:empty {
        display: none;
    }

    #ap-collapse {
        border: none;
        background-color: rgb(from var(--ap-text) r g b / 0.1);
    }
    #ap-collapse:hover {
        background-color: rgb(from var(--ap-text) r g b / 0.2);
    }

    #tetrap-client-area.collapsed {
        width: auto;
        height: auto;
        opacity: 0.3;
    }
    #tetrap-client-area.collapsed:hover {
        opacity: 1;
    }
    #tetrap-client-area.collapsed .ap-tab {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-status {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-username {
        display: none;
    }
    #tetrap-client-area.collapsed nav {
        display: none;
    }

    #ap-shortstatus {
        display: none;
    }
    #tetrap-client-area.collapsed #ap-shortstatus {
        display: block;
        margin: 2px;
    }
    
    #ap-progress-area {
        max-height: 300px;
        overflow-y: scroll;
    }
    #ap-counter-area {
        margin: 0px;
        position: sticky;
        top: 0px;
        background-color: rgb(from var(--ap-bg) r g b / 0.7);
    }
    #ap-ach-count {
        font-size: 24px;
        font-weight: bold;
        font-family: HUN;
    }
    #ap-req-count {
        font-family: HUN;
    }

    .ap-modset {
        display: flex;
        align-items: center;
        padding: 4px 0px;
    }
    .ap-modset:nth-child(even) {
        background-color: var(--ap-bg-darker);
    }
    .ap-modset p, .ap-mod-hint {
        width: 20%;
        margin: 0;
    }
    .ap-modset img, .ap-modset div {
        width: 32px;
        height: 32px;
        margin-right: 2px;
    }
    #tetrap-client-area.dark img[src="/res/achievements/frames/none.png"] {
        filter: invert(1);
    }

    #ap-progress-hint {
        display: flex;
        align-items: center;
        color: var(--ap-disabled);
    }
    #ap-progress-hint p {
        margin: 0;
    }
    .ap-floor-hint {
        text-align: center;
        width: 32px;
        margin-right: 2px !important;
    }

    .chatfocus.chatbg.tetrap-chatfocus #ingame_chat_container {
        background: none !important;
    }
</style>

<header class="tetrap">
    <button id="ap-collapse">▶</button>
    <p class="tetrap">TETR.AP client</p>
    <p class="tetrap" id="ap-status"></p>
    <p class="tetrap" id="ap-username"></p>
</header>
<p id="ap-shortstatus">Not connected</p>

<nav id="ap-nav" class="tetrap disabled">
    <!-- auto-populated by script -->
</nav>

<div id="ap-connect-area" class="ap-tab" data-tab-name="connect">
    <form id="ap-connect-form">
        <label for="ap-server">Server:</label>
        <input id="ap-server" type="text" placeholder="archipelago.gg:12345" required>
        <br>
        <label for="ap-slot">Slot Name:</label>
        <input id="ap-slot" type="text" required>
        <br>
        <label for="ap-password">Password (opt):</label>
        <input id="ap-password" type="text">
        <br>
        <input id="ap-connect" type="submit" value="Connect">
    </form>
</div>

<div id="ap-chat-area" class="ap-tab disabled" data-tab-name="chat">
    <div id="ap-chat-messages"></div>
    <input id="ap-chat-input" type="text" placeholder="type a message, press enter to send..." autocomplete="off">
    </div>
</div>
<div id="ap-progress-area" class="ap-tab disabled" data-tab-name="progress">
    <p id="ap-counter-area">You currently have <span id="ap-ach-count">0</span>/<span id="ap-req-count">Y</span> Achievements required to goal.</p>
    <div id="ap-progress-hint">
        <p class="ap-mod-hint">Modset</p>
        <p class="ap-floor-hint">f2</p>
        <p class="ap-floor-hint">f3</p>
        <p class="ap-floor-hint">f4</p>
        <p class="ap-floor-hint">f5</p>
        <p class="ap-floor-hint">f6</p>
        <p class="ap-floor-hint">f7</p>
        <p class="ap-floor-hint">f8</p>
        <p class="ap-floor-hint">f9</p>
        <p class="ap-floor-hint">f10</p>
    </div>
    <div id="ap-modset-list"></div>
</div>
